name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VDTerminal
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # `check` aggregates every module's verification tasks: the JVM tests
      # (:shared:jvmTest, :server:test), the wasmJs browser tests (headless
      # Chrome, preinstalled on ubuntu-latest), and the wasm app build.
      - name: Check
        run: ./gradlew check --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: VDTerminal/*/build/reports/tests/
          if-no-files-found: ignore

  mod-test:
    name: Mod (Lua) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # FS25 / the GIANTS engine runs Lua 5.1; test the mod's pure-Lua code on the same version.
      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install busted
        run: luarocks install busted

      - name: Run mod unit tests (spec/*_spec.lua)
        working-directory: vdTelemetry
        run: busted --verbose
