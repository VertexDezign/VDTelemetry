name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VDTerminal
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `check` aggregates every module's verification tasks: the JVM tests
      # (:shared:jvmTest, :server:test), the wasmJs browser tests (headless
      # Chrome, preinstalled on ubuntu-latest), and the wasm app build.
      - name: Check
        run: ./gradlew check --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: VDTerminal/*/build/reports/tests/
          if-no-files-found: ignore
